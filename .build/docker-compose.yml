services:
  raspberry_extension_server:
    image: ghcr.io/hendriksen-mark/raspberry_extension_server:latest
    container_name: raspberry_extension_server
    restart: always
    network_mode: host
    privileged: true

    environment:
      - DEBUG=true
      - IP=192.168.1.2
      # - CONFIG_PATH=/opt/raspberry_extension_server/config
      # - BIND_IP=0.0.0.0
      # - HTTP_PORT=5002
    volumes:
      - /opt/raspberry_extension_server/config:/opt/raspberry_extension_server/config
